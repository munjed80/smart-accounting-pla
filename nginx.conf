server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/manifest+json image/svg+xml;

    # Healthcheck endpoint for container orchestrators (Coolify, Docker, etc.)
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Ensure web app manifests are served with the correct MIME type so
    # browsers accept them (otherwise the install prompt and PWA icons
    # silently break). We set the type per-location instead of using a
    # `types {}` block, because `types {}` inside `server` would override
    # the inherited default mime.types map.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /manifest.json {
        default_type application/manifest+json;
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Static asset extensions: serve the file or return 404. Do NOT fall
    # back to index.html for missing assets — otherwise broken icon /
    # og-image / manifest URLs return HTML, which Facebook, Google and
    # browsers treat as broken/unsafe (favicon shows blank, OG preview
    # shows nothing). Note: this nginx serves only the SPA bundle; the
    # backend API is a separate service, so .json/.xml extensions here
    # are always static files in /usr/share/nginx/html.
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|avif|woff2?|ttf|eot|map|xml|txt)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle SPA routing for everything else
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
