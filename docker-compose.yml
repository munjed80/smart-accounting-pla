version: '3.8'

# Smart Accounting Platform – local & Coolify-compatible compose file.
#
# In production (Coolify), each service receives its environment variables
# directly from the orchestrator. The `${VAR:?...}` syntax below makes the
# required production secrets explicit – `docker compose up` fails fast with
# a readable message if any of them is missing, instead of silently using an
# insecure placeholder.
#
# For local development, copy `.env.example` to `.env` and fill in values.

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: smart-accounting-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-accounting_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required – set it in .env or your orchestrator}
      POSTGRES_DB: ${POSTGRES_DB:-accounting_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports exposed – reachable by other services via Docker network as "db:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accounting_user} -d ${POSTGRES_DB:-accounting_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: smart-accounting-redis
    restart: unless-stopped
    # No ports exposed – reachable by other services via Docker network as "redis:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-accounting-backend
    restart: unless-stopped
    environment:
      # Core
      ENV: ${ENV:-production}
      DEBUG: ${DEBUG:-false}
      PORT: ${PORT:-8000}
      # Database (composed from POSTGRES_* so compose & backend stay in sync)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-accounting_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-accounting_db}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-accounting_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-accounting_db}
      REDIS_URL: redis://redis:6379/0
      # Security – must be a 32+ char value (e.g. `openssl rand -hex 32`)
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY is required – generate one with: openssl rand -hex 32}"
      UPLOAD_DIR: /data/uploads
      # CORS / public URLs (Coolify injects production values; defaults are dev-only)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-172.16.0.0/12}
      # Email (Resend) – optional
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-no-reply@zzpershub.nl}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-info@zzpershub.nl}
      INVOICE_FROM_EMAIL: ${INVOICE_FROM_EMAIL:-no-reply@zzpershub.nl}
      INVOICE_FROM_NAME: ${INVOICE_FROM_NAME:-Facturatie}
      INVOICE_REPLY_TO: ${INVOICE_REPLY_TO:-info@zzpershub.nl}
      # Mollie – optional, enables paywall + webhooks
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-}
      MOLLIE_WEBHOOK_SECRET: ${MOLLIE_WEBHOOK_SECRET:-}
      MOLLIE_LOCALE: ${MOLLIE_LOCALE:-nl_NL}
      # GoCardless (PSD2) – optional
      GOCARDLESS_SECRET_ID: ${GOCARDLESS_SECRET_ID:-}
      GOCARDLESS_SECRET_KEY: ${GOCARDLESS_SECRET_KEY:-}
      # Web Push – optional
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      # Billing test toggles – optional
      BILLING_FORCE_PAYWALL: ${BILLING_FORCE_PAYWALL:-false}
      BILLING_TRIAL_OVERRIDE_DAYS: ${BILLING_TRIAL_OVERRIDE_DAYS:-}
      # Admin whitelist – optional
      ADMIN_WHITELIST: ${ADMIN_WHITELIST:-}
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Startup handled by CMD in backend/Dockerfile (startup.sh)
    # startup.sh runs migrations, seeds, then starts uvicorn with proxy-headers

  # Worker Service
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: smart-accounting-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-accounting_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-accounting_db}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # Frontend
  # NOTE: The frontend is built at image build time with VITE_API_URL baked in.
  # For docker-compose, the browser accesses the backend through localhost:8000 
  # (exposed port), NOT through container networking.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # This URL is used at BUILD TIME by Vite - it's the URL the browser will use
        # REQUIRED: must be set to your production API URL (e.g., https://api.zzpershub.nl)
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required – set it to your production API URL}
    container_name: smart-accounting-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
  uploads_data:
