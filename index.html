    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Hoe maak ik gratis een factuur?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Maak een gratis account aan op ZZPers Hub — geen creditcard nodig. Ga daarna naar 'Facturen' en klik op '+ Nieuwe factuur'. Vul de klantgegevens in, voeg regelitems toe met omschrijving en bedrag, kies het btw-tarief en klik op 'Versturen'. Jouw professionele factuur wordt direct als PDF verstuurd naar de klant."
          }
        },
        {
          "@type": "Question",
          "name": "Is ZZPers Hub geschikt voor zzp'ers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, ZZPers Hub is speciaal gemaakt voor zzp'ers, freelancers en zelfstandige ondernemers in Nederland. Je maakt snel professionele facturen, beheert klanten, registreert uren en houdt je btw-overzicht bij — zonder boekhoudkennis en zonder gedoe."
          }
        },
        {
          "@type": "Question",
          "name": "Wat kost ZZPers Hub na de gratis proefperiode?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "De eerste 90 dagen zijn volledig gratis — geen creditcard nodig bij aanmelding. Daarna is ZZPers Hub €4,95 per maand. Je kunt op elk moment opzeggen; er zijn geen opzegtermijnen of verborgen kosten."
          }
        },
        {
          "@type": "Question",
          "name": "Kan ik klanten beheren?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja. Via 'Klanten' voeg je klanten toe met naam, e-mailadres, KvK-nummer en factuuradres. Opgeslagen klanten zijn direct beschikbaar bij het aanmaken van facturen en uren. Je kunt klantgegevens altijd aanpassen via het klantprofiel."
          }
        },
        {
          "@type": "Question",
          "name": "Kan ik uren registreren?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja. Via 'Uren' kun je uren op twee manieren bijhouden: handmatig (datum, klant, aantal uren) of via de ingebouwde timer (start en stop). Geregistreerde uren kun je direct omzetten in factuurregels."
          }
        },
        {
          "@type": "Question",
          "name": "Kan ik bonnetjes uploaden?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja. Bij elke uitgave kun je een foto of PDF van het bonnetje uploaden via de knop 'Bijlage toevoegen'. De uitgave en het bonnetje worden meegenomen in je btw-overzicht en zijn opvraagbaar voor je boekhouder."
          }
        },
        {
          "@type": "Question",
          "name": "Kan ik later met mijn boekhouder samenwerken?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja. Via 'Boekhouder' in het menu nodig je je accountant of boekhouder uit met diens e-mailadres. Na acceptatie krijgt de boekhouder leestoegang tot jouw dossier. Je behoudt altijd de controle en kunt de toegang op elk moment intrekken."
          }
        },
        {
          "@type": "Question",
          "name": "Werkt ZZPers Hub ook op mobiel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, ZZPers Hub werkt als Progressive Web App (PWA) op zowel mobiel als desktop. U kunt het installeren op uw telefoon en facturen onderweg versturen."
          }
        },
        {
          "@type": "Question",
          "name": "Hoe werkt de gratis proefperiode?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Je krijgt 90 dagen gratis toegang tot alle functies, zonder creditcard bij aanmelding. Na 90 dagen wordt je account automatisch beperkt tot alleen-lezen modus tenzij je een abonnement activeert. Je gegevens blijven bewaard. Je ontvangt een herinnering per e-mail voor het einde van de proefperiode."
          }
        },
        {
          "@type": "Question",
          "name": "Hoe exporteer ik mijn gegevens (CSV/JSON)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Via 'Instellingen' → 'Gegevensexport' kun je facturen, uitgaven en urenboekingen exporteren als CSV-bestand (compatibel met Excel) of als JSON. Selecteer het gewenste datumbereik en klik op 'Exporteren'. De download start direct in je browser."
          }
        }
      ]
    }
